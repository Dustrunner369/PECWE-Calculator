<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PECWE Calculator</title>

    <!-- TailwindCSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ApexCharts via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-6">
            <h1 class="text-3xl font-bold text-gray-900">PECWE Calculator</h1>
            <p class="mt-1 text-sm text-gray-500">Performance-based Energy and Carbon Weighted Estimate</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

            <!-- Input Form -->
            <section class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Input Parameters</h2>
                <form id="calc-form" class="space-y-4">
                    <div>
                        <label for="param1" class="block text-sm font-medium text-gray-700">Parameter 1</label>
                        <input type="number" id="param1" name="param1"
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2" />
                    </div>
                    <div>
                        <label for="param2" class="block text-sm font-medium text-gray-700">Parameter 2</label>
                        <input type="number" id="param2" name="param2"
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2" />
                    </div>
                    <button type="submit"
                            class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 transition">
                        Calculate
                    </button>
                </form>
                <div id="results" class="mt-6 hidden">
                    <h3 class="text-lg font-medium text-gray-800">Results</h3>
                    <pre id="results-output" class="mt-2 bg-gray-100 rounded p-4 text-sm overflow-auto"></pre>
                </div>
            </section>

            <!-- Chart Area -->
            <section class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Visualization</h2>
                <div id="chart" class="w-full h-80"></div>
            </section>

        </div>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
