name: CWE Calculator CI

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t pecwe-calculator .

      - name: Run test pipeline
        id: test_run
        run: |
          docker run pecwe-calculator python main.py --test > output.txt
          cat output.txt

      - name: Extract PECWE value
        id: extract
        run: |
          VALUE=$(grep "PECWE_RESULT" output.txt | cut -d "=" -f2)
          echo "value=$VALUE" >> $GITHUB_OUTPUT

      - name: Compare against expected
        id: compare
        run: |
          EXPECTED=1.0
          ACTUAL=${{ steps.extract.outputs.value }}

          DIFF=$(python3 -c "print(abs($EXPECTED - float($ACTUAL)))")
          echo "diff=$DIFF" >> $GITHUB_OUTPUT

      - name: Add summary
        run: |
          echo "## PECWE Test Result" >> $GITHUB_STEP_SUMMARY
          echo "Expected: 1.0" >> $GITHUB_STEP_SUMMARY
          echo "Actual: ${{ steps.extract.outputs.value }}" >> $GITHUB_STEP_SUMMARY
          echo "Difference: ${{ steps.compare.outputs.diff }}" >> $GITHUB_STEP_SUMMARY

      - name: Create issue if test fails
        if: ${{ steps.compare.outputs.diff > 0.1 }}
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "PECWE Test Failed",
              body: `Expected 1.0 but got ${{ steps.extract.outputs.value }}`
            })